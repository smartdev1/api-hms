server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prototype à la racine
    location = / {
        try_files /index.html =404;
    }

    # Assets statiques du prototype
    location /static {
        alias /usr/share/nginx/html/static;
        expires 1y;
    }

    # Documentation Swagger sur /docs
    location /docs {
        alias /usr/share/nginx/html/docs;
        try_files /docs/index.html =404;
    }

    # Fichier YAML pour Swagger
    location = /api.yaml {
        alias /usr/share/nginx/html/docs/hmis-api.yaml;
        default_type application/yaml;
        add_header Cache-Control "no-cache";
    }

    # Swagger initializer
    location = /swagger-initializer.js {
        alias /usr/share/nginx/html/swagger-initializer.js;
        default_type application/javascript;
    }

    # Fallback pour SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}