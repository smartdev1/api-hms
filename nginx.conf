server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prototype à la racine
    location = / {
        try_files /index.html =404;
    }

    # Documentation Swagger sur /docs/ (notez le slash final !)
    location /docs/ {
        alias /usr/share/nginx/html/docs/;
        try_files $uri $uri/ /docs/index.html;
        index index.html;
    }

    # Fichier YAML pour Swagger (accessible depuis /docs/hmis-api.yaml)
    location = /docs/hmis-api.yaml {
        alias /usr/share/nginx/html/docs/hmis-api.yaml;
        default_type application/yaml;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Assets statiques
    location ~* \.(js|css|png|jpg|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}