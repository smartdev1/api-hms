server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prototype principal à la racine
    location = / {
        try_files /index.html =404;
    }

    # Dashboard prototype sur /dashboard
    location = /dashboard {
        try_files /dashboard.html =404;
        default_type text/html;
    }

    # Documentation Swagger sur /docs/
    location /docs/ {
        alias /usr/share/nginx/html/docs/;
        index index.html;
        try_files $uri $uri/ /docs/index.html;
    }

    # Fichier YAML pour Swagger
    location = /docs/api.yaml {
        alias /usr/share/nginx/html/docs/api.yaml;
        default_type application/yaml;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Swagger initializer
    location = /docs/swagger-initializer.js {
        alias /usr/share/nginx/html/docs/swagger-initializer.js;
        default_type application/javascript;
    }

    # Assets statiques (CSS, JS, images)
    location ~* \.(js|css|png|jpg|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback pour SPA (optionnel)
    location / {
        try_files $uri $uri/ /index.html;
    }
}